# Standard Pi-hole + Unbound pairing config.
# Root hints and trust anchors are fetched and kept up to date automatically by
# the mvance/unbound image — nothing to manage by hand here.
#
# Unbound runs on host networking (see docker-compose.yml) and binds loopback only,
# so it's reachable from this machine — which includes Pi-hole, also on host
# networking — and nowhere else: not your LAN, not your tailnet. Binding 127.0.0.1
# (not 0.0.0.0) is what keeps it host-local now that there's no bridge/port-publish
# layer in front of it.

server:
    verbosity: 0

    interface: 127.0.0.1
    port: 5335

    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    do-ip6: no
    prefer-ip6: no

    # DNSSEC validation
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: yes
    use-caps-for-id: no

    edns-buffer-size: 1232
    prefetch: yes
    num-threads: 1
    so-rcvbuf: 1m

    # Don't let answers for private/internal address ranges leak out to public
    # authoritative servers, and don't accept them from public servers either.
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10
